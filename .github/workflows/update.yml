name: Update Model

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4   # ✅ UPDATED

      - uses: actions/setup-python@v5  # ✅ UPDATED
        with:
          python-version: "3.10"

      - run: pip install pandas numpy matplotlib seaborn scikit-learn xgboost

      - run: python generate_results.py

      - run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add outputs/
          git commit -m "auto update" || echo "no changes"
          git push
